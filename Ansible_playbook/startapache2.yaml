- hosts: webservers
  become: true
  tasks:
  - name: Package update apt and upgrades
    apt:
      upgrade: yes
      update_cache: yes
      #cache_valid_time: 86400 
  - name: Install apache2 software
    apt:
      name: apache2
      state: present

  - name: start apache2 service
    service:
      name: apache2
      state: started